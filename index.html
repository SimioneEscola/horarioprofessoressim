<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horários — E.E. Prof. Luiz Simioni Sobrinho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--navy2:#243058;--navy3:#2e3d6a;
  --amber:#f59e0b;--amber2:#fbbf24;
  --green:#16a34a;--green2:#22c55e;
  --sub-color:#f97316;--sub-bg:rgba(249,115,22,.08);--sub-border:#f97316;
  --bg:#f1f5f9;--white:#ffffff;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12);
  --radius:10px;--sidebar:268px;
  --c-mat:#3b82f6;--c-port:#10b981;--c-hist:#f59e0b;--c-fis:#8b5cf6;
  --c-bio:#22c55e;--c-qui:#06b6d4;--c-geo:#f97316;--c-filo:#6366f1;
  --c-arte:#ec4899;--c-ef:#ef4444;--c-ing:#0ea5e9;--c-soc:#a855f7;
  --c-tech:#64748b;--c-adm:#d97706;--c-el:#94a3b8;--c-fin:#84cc16;--c-misc:#0f766e;
}
[data-dark]{
  --bg:#0f172a;--white:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --border:#334155;--navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;transition:background .3s,color .3s}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;position:relative;z-index:10}
.sidebar-header{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.sidebar-title{font-family:'Sora',sans-serif;font-weight:700;font-size:12.5px;line-height:1.3;color:#fff}
.sidebar-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:5px}

/* Section switcher */
.section-switch{display:flex;gap:4px;padding:10px 10px 0;margin-bottom:2px}
.sec-btn{flex:1;padding:7px 6px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;text-align:center}
.sec-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}
.sec-btn.active{background:var(--amber);border-color:var(--amber);color:#fff}
.sec-btn.active.af{background:#16a34a;border-color:#16a34a}

.sidebar-nav{padding:8px 10px;flex:1}
.nav-section{margin-bottom:14px}
.nav-section-label{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 10px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.6);transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:var(--amber);color:#fff;font-weight:600}
.nav-item.active.af-active{background:#16a34a}
.nav-icon{font-size:14px;opacity:.7;flex-shrink:0}
.sidebar-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:6px;flex-wrap:wrap}
.sidebar-btn{flex:1;min-width:50px;padding:6px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:11px;transition:all .15s;font-family:'DM Sans',sans-serif}
.sidebar-btn:hover{background:rgba(255,255,255,.08);color:#fff}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.topbar-title{font-family:'Sora',sans-serif;font-weight:700;font-size:17px;flex:1;min-width:140px}
.topbar-title span{color:var(--amber)}
.topbar-title span.af{color:#16a34a}
.search-wrap{position:relative;flex:1;max-width:300px}
.search-wrap input{width:100%;padding:7px 12px 7px 34px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .15s}
.search-wrap input:focus{outline:none;border-color:var(--amber)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.topbar-controls{display:flex;gap:7px;align-items:center}
.ctrl-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ctrl-btn:hover{border-color:var(--amber);color:var(--amber)}
.ctrl-btn.active{background:var(--amber);border-color:var(--amber);color:#fff}
.ctrl-btn.sub-btn{border-color:var(--sub-color);color:var(--sub-color)}
.ctrl-btn.sub-btn:hover,.ctrl-btn.sub-btn.active{background:var(--sub-color);color:#fff;border-color:var(--sub-color)}

.filter-bar{background:var(--white);border-bottom:1px solid var(--border);padding:9px 22px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.filter-select{padding:5px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;cursor:pointer;transition:border-color .15s}
.filter-select:focus{outline:none;border-color:var(--amber)}
.filter-label{font-size:12px;color:var(--text2);font-weight:500}

.content{flex:1;overflow-y:auto;padding:18px 22px}

/* ── GRID ── */
.schedule-grid{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--white);box-shadow:var(--shadow-md)}
.grid-corner,.grid-day-header{padding:10px 12px}
.grid-period-header,.grid-cell{padding:9px 11px}
.grid-corner{background:var(--navy);color:rgba(255,255,255,.6);font-size:11px;font-weight:600;letter-spacing:.05em}
.grid-day-header{background:var(--navy);color:#fff;font-family:'Sora',sans-serif;font-weight:600;font-size:12px;text-align:center;border-left:1px solid rgba(255,255,255,.08)}
.grid-period-header{background:var(--navy2);color:rgba(255,255,255,.8);font-size:11px;text-align:center;border-top:1px solid rgba(255,255,255,.06)}
.period-num{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;color:#fff;display:block}
.period-time{font-size:9.5px;color:rgba(255,255,255,.4);display:block;margin-top:1px}
.grid-cell{border-top:1px solid var(--border);border-left:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;min-height:68px}
.grid-cell:hover{background:rgba(245,158,11,.04)}
.grid-cell.editable:hover{background:rgba(245,158,11,.09)}
.grid-break{background:var(--bg);border-top:1px solid var(--border);border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10.5px;color:var(--text3);font-style:italic;letter-spacing:.04em;padding:6px}

/* ── LESSON CARD ── */
.lesson-card{border-radius:7px;padding:6px 8px;height:100%;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.lesson-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.lesson-subject{font-size:11.5px;font-weight:600;line-height:1.3;margin-bottom:1px}
.lesson-teacher{font-size:10.5px;color:var(--text2)}
.lesson-teacher.strike{text-decoration:line-through;opacity:.6}
.lesson-sub-teacher{font-size:10.5px;color:var(--sub-color);font-weight:600}
.lesson-sub-reason{font-size:9.5px;color:var(--sub-color);opacity:.8;font-style:italic;margin-top:1px}

/* ── SUBSTITUTION INDICATOR ── */
.sub-badge{position:absolute;top:4px;right:4px;background:var(--sub-color);color:#fff;font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:10px;letter-spacing:.06em;z-index:1}
.grid-cell.has-sub .lesson-card{background:var(--sub-bg)!important;outline:2px solid var(--sub-border);outline-offset:-1px}
.grid-cell.has-sub .lesson-card::before{background:var(--sub-color)!important}

/* ── CONFLICT ── */
.conflict{outline:2px solid #ef4444!important;outline-offset:-2px}
.conflict::after{content:'⚠';position:absolute;top:4px;right:4px;font-size:11px;color:#ef4444}
.grid-cell.has-sub.conflict::after{right:30px}

/* Subject color classes */
.mat{background:rgba(59,130,246,.08)}.mat .lesson-card::before{background:var(--c-mat)}.mat .lesson-subject{color:#1d4ed8}
.port{background:rgba(16,185,129,.08)}.port .lesson-card::before{background:var(--c-port)}.port .lesson-subject{color:#065f46}
.hist{background:rgba(245,158,11,.08)}.hist .lesson-card::before{background:var(--c-hist)}.hist .lesson-subject{color:#92400e}
.fis{background:rgba(139,92,246,.08)}.fis .lesson-card::before{background:var(--c-fis)}.fis .lesson-subject{color:#4c1d95}
.bio{background:rgba(34,197,94,.08)}.bio .lesson-card::before{background:var(--c-bio)}.bio .lesson-subject{color:#14532d}
.qui{background:rgba(6,182,212,.08)}.qui .lesson-card::before{background:var(--c-qui)}.qui .lesson-subject{color:#155e75}
.geo{background:rgba(249,115,22,.08)}.geo .lesson-card::before{background:var(--c-geo)}.geo .lesson-subject{color:#7c2d12}
.filo{background:rgba(99,102,241,.08)}.filo .lesson-card::before{background:var(--c-filo)}.filo .lesson-subject{color:#312e81}
.arte{background:rgba(236,72,153,.08)}.arte .lesson-card::before{background:var(--c-arte)}.arte .lesson-subject{color:#831843}
.ef{background:rgba(239,68,68,.08)}.ef .lesson-card::before{background:var(--c-ef)}.ef .lesson-subject{color:#7f1d1d}
.ing{background:rgba(14,165,233,.08)}.ing .lesson-card::before{background:var(--c-ing)}.ing .lesson-subject{color:#0c4a6e}
.soc{background:rgba(168,85,247,.08)}.soc .lesson-card::before{background:var(--c-soc)}.soc .lesson-subject{color:#581c87}
.tech{background:rgba(100,116,139,.08)}.tech .lesson-card::before{background:var(--c-tech)}.tech .lesson-subject{color:#1e293b}
.adm{background:rgba(217,119,6,.08)}.adm .lesson-card::before{background:var(--c-adm)}.adm .lesson-subject{color:#78350f}
.el{background:rgba(148,163,184,.1)}.el .lesson-card::before{background:var(--c-el)}.el .lesson-subject{color:#475569}
.fin{background:rgba(132,204,22,.08)}.fin .lesson-card::before{background:var(--c-fin)}.fin .lesson-subject{color:#365314}
.misc{background:rgba(15,118,110,.08)}.misc .lesson-card::before{background:var(--c-misc)}.misc .lesson-subject{color:#134e4a}
[data-dark] .mat .lesson-subject{color:#93c5fd}[data-dark] .port .lesson-subject{color:#6ee7b7}[data-dark] .hist .lesson-subject{color:#fde68a}
[data-dark] .fis .lesson-subject{color:#c4b5fd}[data-dark] .bio .lesson-subject{color:#86efac}[data-dark] .qui .lesson-subject{color:#a5f3fc}
[data-dark] .geo .lesson-subject{color:#fdba74}[data-dark] .filo .lesson-subject{color:#a5b4fc}[data-dark] .arte .lesson-subject{color:#f9a8d4}
[data-dark] .ef .lesson-subject{color:#fca5a5}[data-dark] .ing .lesson-subject{color:#7dd3fc}[data-dark] .soc .lesson-subject{color:#d8b4fe}
[data-dark] .tech .lesson-subject{color:#cbd5e1}[data-dark] .adm .lesson-subject{color:#fcd34d}[data-dark] .el .lesson-subject{color:#cbd5e1}
[data-dark] .fin .lesson-subject{color:#bef264}[data-dark] .misc .lesson-subject{color:#5eead4}

/* ── TEACHER VIEW ── */
.teacher-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.teacher-day-col{background:var(--white);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.teacher-day-header{background:var(--navy);color:#fff;padding:9px 13px;font-family:'Sora',sans-serif;font-weight:600;font-size:12.5px}
.teacher-lesson{padding:9px 11px;border-top:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.teacher-lesson:hover{background:var(--bg)}
.teacher-lesson.has-sub{border-left:3px solid var(--sub-color);padding-left:8px}
.teacher-lesson-time{font-size:9.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:3px}
.teacher-lesson-class{font-size:12px;font-weight:700;color:var(--navy)}
[data-dark] .teacher-lesson-class{color:var(--amber2)}
.teacher-sub-badge{display:inline-block;background:var(--sub-color);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:5px;vertical-align:middle}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.info-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.info-card-header{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.info-card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.info-card-title{font-family:'Sora',sans-serif;font-weight:700;font-size:13.5px}
.info-card-sub{font-size:11.5px;color:var(--text2)}
.info-card-rows{display:flex;flex-direction:column;gap:5px}
.info-card-row{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;background:var(--bg);border-radius:6px;font-size:12px}
.info-card-row.is-sub{background:var(--sub-bg);border:1px solid rgba(249,115,22,.2)}
.info-card-row-label{color:var(--text2)}
.info-card-row-value{font-weight:600;font-family:'DM Mono',monospace;font-size:11.5px}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:14px;padding:22px;width:380px;max-width:calc(100vw - 36px);box-shadow:var(--shadow-lg);transform:translateY(8px);transition:transform .2s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .15s}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{outline:none;border-color:var(--amber)}
.modal-field textarea{resize:vertical;min-height:56px}
.modal-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.modal-section-title{font-size:12px;font-weight:700;color:var(--sub-color);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.modal-toggle-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sub-bg);border-radius:8px;border:1.5px solid rgba(249,115,22,.2);cursor:pointer;margin-bottom:12px}
.modal-toggle-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--sub-color);cursor:pointer}
.modal-toggle-label{font-size:13px;font-weight:600;color:var(--sub-color);cursor:pointer}
.modal-sub-fields{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:9px;border-radius:8px;border:none;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.modal-btn.primary{background:var(--amber);color:#fff}
.modal-btn.primary:hover{background:var(--amber2)}
.modal-btn.secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.modal-btn.secondary:hover{border-color:var(--text2)}
.modal-btn.danger{background:rgba(239,68,68,.1);color:#ef4444;border:1.5px solid rgba(239,68,68,.2)}

/* ── SUBSTITUTION PANEL ── */
.sub-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px;box-shadow:var(--shadow)}
.sub-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sub-panel-title{font-family:'Sora',sans-serif;font-weight:700;font-size:14px;color:var(--sub-color)}
.sub-panel-count{background:var(--sub-color);color:#fff;font-size:11px;font-weight:700;padding:1px 8px;border-radius:12px}
.sub-list{display:flex;flex-direction:column;gap:8px}
.sub-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--sub-bg);border:1px solid rgba(249,115,22,.2);border-radius:8px;border-left:3px solid var(--sub-color)}
.sub-item-info{flex:1;min-width:0}
.sub-item-main{font-size:12.5px;font-weight:600}
.sub-item-detail{font-size:11px;color:var(--text2);margin-top:1px}
.sub-item-reason{font-size:11px;color:var(--sub-color);font-style:italic}
.sub-item-remove{padding:4px 8px;border-radius:6px;border:1px solid rgba(249,115,22,.3);background:transparent;color:var(--sub-color);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.sub-item-remove:hover{background:var(--sub-color);color:#fff}

/* ── MISC ── */
.stats-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:9px 14px;flex:1;min-width:110px}
.stat-chip-value{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;color:var(--amber)}
.stat-chip-value.af{color:#16a34a}
.stat-chip-label{font-size:10.5px;color:var(--text2);margin-top:1px}
.tab-strip{display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:16px;border:1px solid var(--border);overflow-x:auto}
.tab-btn{flex:1;min-width:52px;padding:6px 10px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--white);color:var(--navy);font-weight:700;box-shadow:var(--shadow)}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state-icon{font-size:44px;margin-bottom:10px;opacity:.4}
.empty-state-text{font-size:14px;font-weight:500}
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px;font-size:12.5px;box-shadow:var(--shadow-lg);transform:translateY(70px);opacity:0;transition:all .3s;z-index:200;display:flex;align-items:center;gap:7px}
.toast.show{transform:translateY(0);opacity:1}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:12px;margin-left:4px;vertical-align:middle;color:#fff}
.lunch-note{font-size:9px;color:rgba(255,255,255,.35);display:block;margin-top:1px;font-style:italic}

@media print{
  .sidebar,.topbar,.filter-bar,.ctrl-btn,.modal-overlay,.toast{display:none!important}
  .main{height:auto;overflow:visible}.content{overflow:visible;padding:0}

  const base = [
    {num:'1ª',time:'7:00–7:50',pi:0},{num:'2ª',time:'7:50–8:40',pi:1},

    base.push({num:'ALM',isBreak:true,label:'Almoço',time:'11:20–12:20'});
    base.push({num:'6ª',time:'12:20–13:10',pi:5});

  return base;
}

//  STATE
// ═══════════════════════════════════════════════════════
let currentSection = 'em';
let emSchedule = {}, afSchedule = {};
let history = [];
let subData = {}; // key: `${section}-${d}-${p}-${c}` → {teacher,reason}
let currentView = 'turma';
let selectedClass = {'em':'1°A','af':'6°A'};
let selectedTeacher = {'em':'','af':''};
let selectedSubject = {'em':'','af':''};
let editMode = false;
let subMode = false;
let editTarget = null;
let darkMode = false;
let searchQuery = '';

function buildSched(raw, nClasses){
  const s = {};
  for(let d=0;d<5;d++){s[d]={};for(let p=0;p<7;p++){s[d][p]={};}}
  raw.forEach(([d,p,c,t,sub])=>{ s[d][p][c]={teacher:t,subject:sub}; });
  return s;
}

// ── SECTION HELPERS ──
function getCls(){ return currentSection==='em'?EM_CLASSES:AF_CLASSES; }
function getSched(){ return currentSection==='em'?emSchedule:afSchedule; }
function getDays(){ return currentSection==='em'?EM_DAYS_SHORT:AF_DAYS_SHORT; }
function getSelClass(){ return selectedClass[currentSection]; }
function getSelTeacher(){ return selectedTeacher[currentSection]; }
function getSelSubject(){ return selectedSubject[currentSection]; }

// ── SUBSTITUTION HELPERS ──
function subKey(d,p,c){ return `${currentSection}-${d}-${p}-${c}`; }
function getSub(d,p,c){ return subData[subKey(d,p,c)]; }
function setSub(d,p,c,data){ subData[subKey(d,p,c)]=data; saveToStorage(); }
function clearSub(d,p,c){ delete subData[subKey(d,p,c)]; saveToStorage(); }
function getSubKeyBySection(section){ return Object.keys(subData).filter(k=>k.startsWith(section+'-')); }

// ── COLOR ──
function getColorClass(subject){
  if(!subject) return 'misc';
  const s=subject.toLowerCase();
  if(s.includes('matemát')||s.includes('mat. aplic')) return 'mat';
  if(s.includes('portuguesa')||s.includes('redação')||s.includes('red. e ')||s.includes('l. port')) return 'port';
  if(s.includes('histór')) return 'hist';
  if(s.includes('física')&&!s.includes('ed. fís')) return 'fis';
  if(s.includes('biolog')) return 'bio';
  if(s.includes('quím')) return 'qui';
  if(s.includes('geograf')) return 'geo';
  if(s.includes('filoso')||s.includes('filo')) return 'filo';
  if(s.includes('arte')) return 'arte';
  if(s.includes('ed. fís')||s.includes('educação fís')) return 'ef';
  if(s.includes('inglesa')||s.includes('inglês')) return 'ing';
  if(s.includes('sociolog')) return 'soc';
  if(s.includes('ciência')) return 'bio';
  if(s.includes('prog.')||s.includes('programação')||s.includes('log.')||s.includes('mod. design')||
     s.includes('proc. design')||s.includes('vers.')||s.includes('front')||s.includes('back')||
     s.includes('mobile')||s.includes('intel. artif')||s.includes('multidisciplinar')||s.includes('tecnologia')) return 'tech';
  if(s.includes('adm')||s.includes('gestão')||s.includes('com. emp')||s.includes('marketing')||
     s.includes('inovação')||s.includes('carreira')||s.includes('liderança')) return 'adm';
  if(s.includes('eletiva')) return 'el';
  if(s.includes('financ')||s.includes('ed. fin')) return 'fin';
  return 'misc';
}

// ── STORAGE ──
function saveToStorage(){
  try{
    localStorage.setItem('simioni_em',JSON.stringify(emSchedule));
    localStorage.setItem('simioni_af',JSON.stringify(afSchedule));
    localStorage.setItem('simioni_subs',JSON.stringify(subData));
  }catch(e){}
}
function loadFromStorage(){
  try{
    const em=localStorage.getItem('simioni_em');
    const af=localStorage.getItem('simioni_af');
    const sb=localStorage.getItem('simioni_subs');
    if(em) emSchedule=JSON.parse(em);
    if(af) afSchedule=JSON.parse(af);
    if(sb) subData=JSON.parse(sb);
  }catch(e){}
}

// ── CONFLICT DETECTION ──
function findConflicts(){
  const s=getSched(), cls=getCls();
  const conflicts=new Set();
  for(let d=0;d<5;d++) for(let p=0;p<7;p++){
    const tm={};
    for(let c=0;c<cls.length;c++){
      const cell=s[d][p][c]; if(!cell||!cell.teacher) continue;
      // Check substitution teacher too
      const sub=getSub(d,p,c);
      const t=(sub?sub.teacher:cell.teacher).trim().toLowerCase();
      if(!t) continue;
      if(tm[t]!==undefined){conflicts.add(`${d}-${p}-${c}`);conflicts.add(`${d}-${p}-${tm[t]}`);} else tm[t]=c;
    }
  }
  return conflicts;
}

// ── UNIQUE VALUES ──
function getTeachers(){
  const s=getSched(),cls=getCls(),set=new Set();
  cls.forEach((_,ci)=>{
    for(let d=0;d<5;d++) for(let p=0;p<7;p++){
      const cell=s[d][p][ci];if(cell&&cell.teacher)set.add(cell.teacher);
    }
  });
  // Also substitutes
  Object.keys(subData).filter(k=>k.startsWith(currentSection+'-')).forEach(k=>{if(subData[k]&&subData[k].teacher)set.add(subData[k].teacher);});
  return [...set].sort();
}
function getSubjects(){
  const s=getSched(),cls=getCls(),set=new Set();
  cls.forEach((_,ci)=>{
    for(let d=0;d<5;d++) for(let p=0;p<7;p++){const cell=s[d][p][ci];if(cell&&cell.subject)set.add(cell.subject);}
  });
  return [...set].sort();
}

// ═══════════════════════════════════════════════════════
//  RENDER CELL
// ═══════════════════════════════════════════════════════
function renderCell(d, p, c, conflicts){
  const s=getSched();
  const cell=s[d][p][c];
  const sub=getSub(d,p,c);
  const key=`${d}-${p}-${c}`;
  const isConflict=conflicts&&conflicts.has(key);
  const hasSub=!!sub;
  const isEmpty=!cell||(!cell.subject&&!cell.teacher);
  const cls=cell?getColorClass(cell.subject):'';
  
  let inner='';
  if(!isEmpty||hasSub){
    inner=`<div class="lesson-card ${cls}">
      ${hasSub?`<div class="sub-badge">SUB</div>`:''}
      <div class="lesson-subject">${cell?cell.subject||'':''}</div>
      <div class="lesson-teacher ${hasSub?'strike':''}">👤 ${cell?cell.teacher||'':''}</div>
      ${hasSub?`<div class="lesson-sub-teacher">👤 ${sub.teacher}</div>`:''}
      ${hasSub&&sub.reason?`<div class="lesson-sub-reason">📝 ${sub.reason}</div>`:''}
    </div>`;
  }
  
  return `<div class="grid-cell ${isConflict?'conflict':''} ${hasSub?'has-sub':''} ${editMode||subMode?'editable':''}"
    data-d="${d}" data-p="${p}" data-c="${c}"
    draggable="${editMode}"
    ondragstart="onDragStart(event)"
    ondragover="onDragOver(event)"
    ondrop="onDrop(event)"
    onclick="onCellClick(${d},${p},${c})"
    title="${hasSub?`Substituição: ${sub.teacher}${sub.reason?' — '+sub.reason:''}`:editMode?'Clique para editar':''}">
    ${inner}
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  TURMA VIEW
// ═══════════════════════════════════════════════════════
function renderTurmaView(){
  const cls=getCls(); const sched=getSched();
  const cIdx=cls.indexOf(getSelClass());
  if(cIdx<0) return '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Selecione uma turma</div></div>';
  const conflicts=findConflicts();
  
  // Stats
  let total=0, teachers=new Set(), subjects=new Set(), subCount=0;
  for(let d=0;d<5;d++) for(let p=0;p<7;p++){
    const cell=sched[d][p][cIdx];
    if(cell&&cell.subject){total++;teachers.add(cell.teacher);subjects.add(cell.subject);}
    if(getSub(d,p,cIdx)) subCount++;
  }
  
  const isAF=currentSection==='af';
  const valColor=isAF?'af':'';
  
  let html=`<div class="stats-bar">
    <div class="stat-chip"><div class="stat-chip-value ${valColor}">${total}</div><div class="stat-chip-label">Aulas/semana</div></div>
    <div class="stat-chip"><div class="stat-chip-value ${valColor}">${teachers.size}</div><div class="stat-chip-label">Professores</div></div>
    <div class="stat-chip"><div class="stat-chip-value ${valColor}">${subjects.size}</div><div class="stat-chip-label">Disciplinas</div></div>
    <div class="stat-chip"><div class="stat-chip-value" style="color:var(--sub-color)">${subCount}</div><div class="stat-chip-label">Substituições</div></div>
  </div>`;
  
  // Class tabs
  html+='<div class="tab-strip">';
  cls.forEach(c=>{ html+=`<button class="tab-btn ${c===getSelClass()?'active':''}" onclick="selectClass('${c}')">${c}</button>`; });
  html+='</div>';
  
  // Legend
  html+=renderLegend(cIdx);
  
  // Get period rows
  const periods=isAF?getAfPeriods(cIdx<AF_EARLY_LUNCH):EM_PERIODS;
  
  html+=`<div class="schedule-grid" style="display:grid;grid-template-columns:88px repeat(5,1fr)">`;
  html+=`<div class="grid-corner">Aula / Dia</div>`;
  getDays().forEach(d=>{ html+=`<div class="grid-day-header">${d}</div>`; });
  
  periods.forEach(period=>{
    if(period.isBreak){
      html+=`<div class="grid-period-header" style="background:#334155;font-size:10px;color:rgba(255,255,255,.35)">${period.label}</div>`;
      for(let d=0;d<5;d++) html+=`<div class="grid-break">${period.label}${period.time?` · ${period.time}`:''}</div>`;
      return;
    }
    html+=`<div class="grid-period-header"><span class="period-num">${period.num}</span><span class="period-time">${period.time}</span></div>`;
    for(let d=0;d<5;d++) html+=renderCell(d, period.pi, cIdx, conflicts);
  });
  html+='</div>';
  return html;
}

function renderLegend(cIdx){
  const sched=getSched(),seen=new Map();
  for(let d=0;d<5;d++) for(let p=0;p<7;p++){
    const cell=sched[d][p][cIdx];
    if(cell&&cell.subject&&!seen.has(cell.subject)) seen.set(cell.subject,getColorClass(cell.subject));
  }
  const colorHex={mat:'#3b82f6',port:'#10b981',hist:'#f59e0b',fis:'#8b5cf6',bio:'#22c55e',qui:'#06b6d4',
    geo:'#f97316',filo:'#6366f1',arte:'#ec4899',ef:'#ef4444',ing:'#0ea5e9',soc:'#a855f7',
    tech:'#64748b',adm:'#d97706',el:'#94a3b8',fin:'#84cc16',misc:'#0f766e'};
  let html='<div class="legend">';
  seen.forEach((c,sub)=>{ html+=`<div class="legend-item"><div class="legend-dot" style="background:${colorHex[c]||'#64748b'}"></div>${sub}</div>`; });
  html+='</div>';
  return html;
}

function renderProfessorView(){

  const sel=getSelTeacher();

  const isAF=currentSection==='af';

  const results=[];

        <div><div class="info-card-title">${cell.subject}${sub?` <span style="color:var(--sub-color);font-size:10px">[SUB]</span>`:''}</div>
        <div class="info-card-sub">👤 ${cell.teacher}${sub?` → ${sub.teacher}`:''}</div></div>
      </div>
      <div class="info-card-rows">
        <div class="info-card-row"><span class="info-card-row-label">Turma</span><span class="info-card-row-value">${cls[c]}</span></div>
        <div class="info-card-row"><span class="info-card-row-label">Dia</span><span class="info-card-row-value">${getDays()[d]}</span></div>

function render(){
  const el=document.getElementById('mainContent');
  switch(currentView){
    case 'turma': el.innerHTML=renderTurmaView(); break;
    case 'professor': el.innerHTML=renderProfessorView(); break;
    case 'disciplina': el.innerHTML=renderDisciplinaView(); break;
    case 'substituicoes': el.innerHTML=renderSubstituicoesView(); break;
    case 'busca': el.innerHTML=renderBuscaView(); break;
    default: el.innerHTML=renderTurmaView();
  }
  populateFilters();
  updateSidebarClasses();
}

function updateSidebarClasses(){
  const cls=getCls();
  const icons=['🔵','🔵','🔵','🟢','🟠','🟣','🟣','🔴','🔴','🟤'];
  let html='';
  cls.forEach((c,i)=>{ html+=`<div class="nav-item ${c===getSelClass()&&currentView==='turma'?(currentSection==='af'?'af-active':'active'):''}" data-view="turma" data-class="${c}"><span class="nav-icon">${icons[i]||'⚪'}</span> ${c}</div>`; });
  document.getElementById('classNavItems').innerHTML=html;
  document.getElementById('classNavLabel').textContent=currentSection==='em'?'Ensino Médio':'Anos Finais — Turmas';
  // re-bind nav items
  document.querySelectorAll('#classNavItems .nav-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const c=item.dataset.class;
      if(c){ selectedClass[currentSection]=c; }
      currentView='turma'; searchQuery=''; document.getElementById('globalSearch').value='';
      updateNavActive(); render();
      document.getElementById('sidebar').classList.remove('open');
    });
  });
}

function populateFilters(){
  const fc=document.getElementById('filterClass'),ft=document.getElementById('filterTeacher'),fs=document.getElementById('filterSubject');
  const teachers=getTeachers(),subjects=getSubjects(),cls=getCls();
  fc.innerHTML='<option value="">Todas as turmas</option>'+cls.map(c=>`<option ${c===getSelClass()?'selected':''}>${c}</option>`).join('');
  ft.innerHTML='<option value="">Todos os professores</option>'+teachers.map(t=>`<option ${t===getSelTeacher()?'selected':''}>${t}</option>`).join('');

function selectClass(c){ selectedClass[currentSection]=c; render(); }
function selectTeacher(t){ selectedTeacher[currentSection]=t; render(); }
function selectSubject(s){ selectedSubject[currentSection]=s; render(); }

function removeSub(key){
  delete subData[key]; saveToStorage(); render(); toast('🔄 Substituição removida');
}

function onCellClick(d,p,c){
  if(!editMode&&!subMode) return;
  openEditModal(d,p,c);
}
function onSearchResultClick(d,p,c){

// ── DRAG & DROP ──
let dragSrc=null;
function onDragStart(e){ dragSrc={d:+e.currentTarget.dataset.d,p:+e.currentTarget.dataset.p,c:+e.currentTarget.dataset.c}; e.dataTransfer.effectAllowed='move'; }
function onDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function onDrop(e){
  e.preventDefault(); if(!dragSrc||!editMode) return;
  const dst={d:+e.currentTarget.dataset.d,p:+e.currentTarget.dataset.p,c:+e.currentTarget.dataset.c};
  if(dragSrc.d===dst.d&&dragSrc.p===dst.p&&dragSrc.c===dst.c) return;
  const s=getSched();
  const prev=JSON.parse(JSON.stringify({em:emSchedule,af:afSchedule,subs:subData}));
  history.push(prev);
  // swap cells
  const a=s[dragSrc.d][dragSrc.p][dragSrc.c],b=s[dst.d][dst.p][dst.c];
  s[dragSrc.d][dragSrc.p][dragSrc.c]=b; s[dst.d][dst.p][dst.c]=a;
  // swap subs
  const sk1=subKey.call({currentSection},dragSrc.d,dragSrc.p,dragSrc.c);
  // simpler: rebuild subKey with correct section
  const subA=subData[`${currentSection}-${dragSrc.d}-${dragSrc.p}-${dragSrc.c}`];
  const subB=subData[`${currentSection}-${dst.d}-${dst.p}-${dst.c}`];
  if(subA) subData[`${currentSection}-${dst.d}-${dst.p}-${dst.c}`]=subA; else delete subData[`${currentSection}-${dst.d}-${dst.p}-${dst.c}`];
  if(subB) subData[`${currentSection}-${dragSrc.d}-${dragSrc.p}-${dragSrc.c}`]=subB; else delete subData[`${currentSection}-${dragSrc.d}-${dragSrc.p}-${dragSrc.c}`];
  saveToStorage(); render(); enableUndo(); toast('✅ Aulas trocadas!'); dragSrc=null;
}

  editTarget={d,p,c};
  const sched=getSched();
  const cell=sched[d][p][c]||{teacher:'',subject:''};
  const sub=getSub(d,p,c);
  const cls=getCls();
  const isAF=currentSection==='af';
  const periods=isAF?getAfPeriods(c<AF_EARLY_LUNCH):EM_PERIODS;
  const pRow=periods.find(x=>!x.isBreak&&x.pi===p);
  
  document.getElementById('modalSub').textContent=`${getDays()[d]} · ${pRow?pRow.num+' · '+pRow.time:''} · Turma ${cls[c]}`;
  document.getElementById('modalSubject').value=cell.subject||'';
  document.getElementById('modalTeacher').value=cell.teacher||'';
  
  const isSub=!!sub;
  document.getElementById('modalIsSub').checked=isSub;
  document.getElementById('modalSubFields').style.display=isSub?'block':'none';
  document.getElementById('modalSubTeacher').value=sub?sub.teacher:'';
  document.getElementById('modalSubReason').value=sub?sub.reason||'':'';
  
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById(subMode&&!editMode?'modalSubTeacher':'modalSubject').focus(),100);
}

function closeModal(){ document.getElementById('editModal').classList.remove('open'); editTarget=null; }

document.getElementById('modalIsSub').onchange=function(){
  document.getElementById('modalSubFields').style.display=this.checked?'block':'none';
  if(this.checked) setTimeout(()=>document.getElementById('modalSubTeacher').focus(),50);
};
document.getElementById('modalCancel').onclick=closeModal;
document.getElementById('editModal').onclick=function(e){ if(e.target===this) closeModal(); };
document.getElementById('modalSave').onclick=function(){
  if(!editTarget) return;
  const {d,p,c}=editTarget;
  const prev=JSON.parse(JSON.stringify({em:emSchedule,af:afSchedule,subs:subData}));
  history.push(prev);
  const sub=document.getElementById('modalSubject').value.trim();
  const teacher=document.getElementById('modalTeacher').value.trim();
  const isSub=document.getElementById('modalIsSub').checked;
  const subTeacher=document.getElementById('modalSubTeacher').value.trim();
  const subReason=document.getElementById('modalSubReason').value.trim();
  
  if(editMode){ getSched()[d][p][c]={teacher,subject:sub}; }
  if(isSub&&subTeacher){ setSub(d,p,c,{teacher:subTeacher,reason:subReason}); }
  else if(!isSub){ clearSub(d,p,c); }
  
  saveToStorage(); render(); closeModal(); enableUndo();
  toast(isSub?'🔄 Substituição registrada!':'✅ Aula atualizada!');
};
document.getElementById('modalClear').onclick=function(){
  if(!editTarget) return;
  const {d,p,c}=editTarget;
  const prev=JSON.parse(JSON.stringify({em:emSchedule,af:afSchedule,subs:subData}));
  history.push(prev);
  getSched()[d][p][c]={teacher:'',subject:''}; clearSub(d,p,c);
  saveToStorage(); render(); closeModal(); enableUndo(); toast('🗑️ Célula limpa');
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════════════════════════
//  TOOLBAR
// ═══════════════════════════════════════════════════════
document.getElementById('subModeBtn').onclick=function(){
  subMode=!subMode;
  this.classList.toggle('active',subMode);
  this.textContent=subMode?'🔄 Substituindo':'🔄 Substituição';
  if(subMode){ editMode=false; document.getElementById('editModeBtn').classList.remove('active'); document.getElementById('editModeBtn').textContent='✏️ Editar'; }
  render();
};
document.getElementById('editModeBtn').onclick=function(){
  editMode=!editMode;
  this.classList.toggle('active',editMode);
  this.textContent=editMode?'✅ Editando':'✏️ Editar';
  document.getElementById('saveBtn').style.display=editMode?'':'none';
  if(editMode){ subMode=false; document.getElementById('subModeBtn').classList.remove('active'); document.getElementById('subModeBtn').textContent='🔄 Substituição'; }
  render();
};
document.getElementById('saveBtn').onclick=function(){ saveToStorage(); toast('💾 Salvo!'); };
document.getElementById('undoBtn').onclick=function(){
  if(!history.length) return;
  const prev=history.pop();
  emSchedule=prev.em; afSchedule=prev.af; subData=prev.subs;
  saveToStorage(); render();
  if(!history.length){ this.disabled=true; this.style.opacity='.4'; }
  toast('↩ Desfeito');
};
document.getElementById('darkModeBtn').onclick=function(){
  darkMode=!darkMode;
  document.body.toggleAttribute('data-dark',darkMode);
  this.textContent=darkMode?'☀️ Claro':'🌙 Escuro';
  try{ localStorage.setItem('simioni_dark',darkMode?'1':'0'); }catch(e){}
};
document.getElementById('printBtn').onclick=()=>window.print();
document.getElementById('resetBtn').onclick=function(){
  if(!confirm('Restaurar todos os dados originais? Substituições e edições serão perdidas.')) return;
  emSchedule=buildSched(EM_RAW,9); afSchedule=buildSched(AF_RAW,10); subData={};
  history=[]; saveToStorage(); render(); enableUndo(false); toast('↩ Dados restaurados');
};

function enableUndo(on=true){
  const btn=document.getElementById('undoBtn');
  btn.disabled=!on; btn.style.opacity=on?'1':'.4';
}

// FILTERS
document.getElementById('filterClass').onchange=function(){ if(this.value){ currentView='turma'; selectedClass[currentSection]=this.value; updateNavActive(); render(); } };
document.getElementById('filterTeacher').onchange=function(){ if(this.value){ currentView='professor'; selectedTeacher[currentSection]=this.value; updateNavActive(); render(); } };
document.getElementById('filterSubject').onchange=function(){ if(this.value){ currentView='disciplina'; selectedSubject[currentSection]=this.value; updateNavActive(); render(); } };
document.getElementById('clearFilters').onclick=function(){
  document.getElementById('filterClass').value='';
  document.getElementById('filterTeacher').value='';
  document.getElementById('filterSubject').value='';
};

// SEARCH
let searchTimer;
document.getElementById('globalSearch').oninput=function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ searchQuery=this.value; if(searchQuery.trim()){ currentView='busca'; updateNavActive(); } render(); },250);
};

// NAV
document.querySelectorAll('.nav-item[data-view]').forEach(item=>{
  item.addEventListener('click',()=>{
    const v=item.dataset.view,c=item.dataset.class;
    if(c) selectedClass[currentSection]=c;
    currentView=v; searchQuery=''; document.getElementById('globalSearch').value='';
    updateNavActive(); render();
    document.getElementById('sidebar').classList.remove('open');
  });
});
function updateNavActive(){
  document.querySelectorAll('.nav-item[data-view]').forEach(item=>{
    const v=item.dataset.view,c=item.dataset.class;
    const match=v===currentView&&(!c||(c===getSelClass()));
    item.classList.toggle('active',match&&currentSection==='em');
    item.classList.toggle('af-active',match&&currentSection==='af');
  });
}

// MOBILE
document.getElementById('menuToggle').onclick=()=>document.getElementById('sidebar').classList.toggle('open');
function checkResponsive(){
  document.getElementById('menuToggle').style.display=window.innerWidth<768?'flex':'none';
}
window.addEventListener('resize',checkResponsive);

// TOAST
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
emSchedule=buildSched(EM_RAW,9);
afSchedule=buildSched(AF_RAW,10);
loadFromStorage();
try{
  if(localStorage.getItem('simioni_dark')==='1'){
    darkMode=true; document.body.setAttribute('data-dark','');
    document.getElementById('darkModeBtn').textContent='☀️ Claro';
  }
}catch(e){}
checkResponsive();
render();
updateNavActive();
</script>
</body>
</html>
